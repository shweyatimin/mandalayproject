       <!-- Image Lightbox -->
        <div id="lightbox"
            class="fixed inset-0 bg-black/80 hidden items-center justify-center z-50">

            <!-- Close -->
            <button onclick="closeLightbox()"
                class="absolute top-6 right-6 text-white text-4xl hover:text-gray-300">
                &times;
            </button>

            <!-- Previous -->
            <button onclick="prevImage()"
                class="absolute left-6 top-1/2 -translate-y-1/2 text-white text-4xl hover:text-gray-300">
                <i class="fas fa-angle-left"></i>
            </button>

            <!-- Image -->
            <img id="lightboxImg"
                class="max-w-[90%] max-h-[90%] rounded-lg shadow-2xl">

            <!-- Next -->
            <button onclick="nextImage()"
                class="absolute right-6 top-1/2 -translate-y-1/2 text-white text-4xl hover:text-gray-300">
                <i class="fas fa-angle-right"></i>
            </button>
        </div>


        <script >

            function togglemenu(ele){
                  //console.log(ele);
                  //console.log(ele.className);

                  const getul = document.querySelector('ul');
                  ele.classList.contains('togglemenu') ? (ele.classList.remove('togglemenu'),getul.classList.add('opacity-100'))  : (ele.classList.add('togglemenu'),getul.classList.add('opacity-100'));
            }

            const galleryImages = Array.from(document.querySelectorAll("section img"));
            let currentIndex = 0;

            function openLightbox(imgElement) {
                currentIndex = galleryImages.indexOf(imgElement);
                document.getElementById("lightboxImg").src = imgElement.src;

                const lightbox = document.getElementById("lightbox");
                lightbox.classList.remove("hidden");
                lightbox.classList.add("flex");
            }

            function closeLightbox() {
                const lightbox = document.getElementById("lightbox");
                lightbox.classList.add("hidden");
                lightbox.classList.remove("flex");
            }

            function nextImage() {
                currentIndex = (currentIndex + 1) % galleryImages.length;
                document.getElementById("lightboxImg").src = galleryImages[currentIndex].src;
            }

            function prevImage() {
                currentIndex = (currentIndex - 1 + galleryImages.length) % galleryImages.length;
                document.getElementById("lightboxImg").src = galleryImages[currentIndex].src;
            }
        </script>
